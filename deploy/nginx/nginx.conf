# ═══════════════════════════════════════════════════════════════
# 鸡生蛋 Eggo · Nginx 反向代理 + SSL 配置
# ═══════════════════════════════════════════════════════════════
# 流量分发:
#   /api/v1/egg/*     → go-api:8080    (核心决策 API)
#   /api/v1/auth/*    → go-api:8080    (用户认证)
#   /api/v1/funds/*   → go-api:8080    (基金数据)
#   /api/v1/ai/*      → python-ai:8000 (AI 过滤服务)
#   /api/v1/tasks/*   → python-ai:8000 (异步任务)
#   /api/v1/news/*    → python-ai:8000 (新闻服务)
# ═══════════════════════════════════════════════════════════════

user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── 日志格式 ──────────────────────────────────────────────
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for" '
                      'rt=$request_time';

    access_log  /var/log/nginx/access.log  main;

    # ── 性能优化 ──────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;

    # ── Gzip 压缩 ────────────────────────────────────────────
    gzip  on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        image/svg+xml;

    # ── 安全头 ────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── 隐藏版本号 ────────────────────────────────────────────
    server_tokens off;

    # ── 限流配置 ──────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;

    # ── 上游服务 ──────────────────────────────────────────────
    upstream go_api {
        server go-api:8080;
        keepalive 32;
    }

    upstream python_ai {
        server python-ai:8000;
        keepalive 16;
    }

    # ══════════════════════════════════════════════════════════
    # HTTP → HTTPS 强制跳转
    # ══════════════════════════════════════════════════════════
    server {
        listen 80;
        server_name _;

        # Let's Encrypt 验证
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # 其他请求强制跳转 HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ══════════════════════════════════════════════════════════
    # HTTPS 主服务
    # ══════════════════════════════════════════════════════════
    server {
        listen 443 ssl http2;
        server_name eggo.example.com;  # 替换为你的域名

        # ── SSL 证书 ──────────────────────────────────────────
        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        # ── SSL 安全配置 ──────────────────────────────────────
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_session_tickets off;

        # ── HSTS ──────────────────────────────────────────────
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

        # ── 请求体大小限制 ────────────────────────────────────
        client_max_body_size 10m;

        # ── 健康检查端点 ──────────────────────────────────────
        location /health {
            access_log off;
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }

        # ══════════════════════════════════════════════════════
        # Go API 路由
        # ══════════════════════════════════════════════════════

        # 母鸡状态（核心决策）
        location /api/v1/egg/ {
            limit_req zone=api_limit burst=50 nodelay;

            proxy_pass http://go_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
            proxy_send_timeout 10s;

            proxy_http_version 1.1;
        }

        # 用户认证（严格限流）
        location /api/v1/auth/ {
            limit_req zone=auth_limit burst=10 nodelay;

            proxy_pass http://go_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            proxy_connect_timeout 10s;
            proxy_read_timeout 15s;
            proxy_send_timeout 10s;

            proxy_http_version 1.1;
        }

        # 基金数据
        location /api/v1/funds/ {
            limit_req zone=api_limit burst=50 nodelay;

            proxy_pass http://go_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
            proxy_send_timeout 10s;

            proxy_http_version 1.1;
        }

        # 自选基金
        location /api/v1/watchlist/ {
            limit_req zone=api_limit burst=50 nodelay;

            proxy_pass http://go_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
            proxy_send_timeout 10s;

            proxy_http_version 1.1;
        }

        # 交易信号
        location /api/v1/signals/ {
            limit_req zone=api_limit burst=50 nodelay;

            proxy_pass http://go_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
            proxy_send_timeout 10s;

            proxy_http_version 1.1;
        }

        # ══════════════════════════════════════════════════════
        # Python AI 路由
        # ══════════════════════════════════════════════════════

        # AI 过滤处理（较长超时）
        location /api/v1/ai/ {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://python_ai;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            proxy_connect_timeout 10s;
            proxy_read_timeout 120s;  # AI 推理可能较慢
            proxy_send_timeout 30s;

            proxy_http_version 1.1;
        }

        # 异步任务
        location /api/v1/tasks/ {
            limit_req zone=api_limit burst=30 nodelay;

            proxy_pass http://python_ai;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
            proxy_send_timeout 10s;

            proxy_http_version 1.1;
        }

        # 新闻服务
        location /api/v1/news/ {
            limit_req zone=api_limit burst=30 nodelay;

            proxy_pass http://python_ai;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
            proxy_send_timeout 10s;

            proxy_http_version 1.1;
        }

        # AI 健康检查
        location /api/v1/health {
            proxy_pass http://python_ai;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 5s;
            proxy_read_timeout 5s;

            proxy_http_version 1.1;
        }

        # ══════════════════════════════════════════════════════
        # 默认路由 → 拒绝
        # ══════════════════════════════════════════════════════
        location / {
            return 404 '{"code":404,"message":"Not Found"}';
            add_header Content-Type application/json;
        }

        # ── 错误页面 ──────────────────────────────────────────
        error_page 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }
    }
}
